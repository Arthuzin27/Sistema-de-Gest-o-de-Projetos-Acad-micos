<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dashboard Analítico</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h2>Acesso ao Sistema</h2>
        </div>

        <div class="login-content">
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="exemplo@dominio.com" required>
            </div>

            <div class="input-group">
                <label for="pass">Senha</label>
                <input type="password" id="pass" placeholder="Mínimo 6 caracteres" required>
            </div>

            <button type="button" id="submit">Entrar</button>

            <hr>
            
            <button type="button" id="database">Gerar Usuário de Teste (ADM)</button>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
